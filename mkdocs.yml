site_name: EmergencyForge Wiki
site_description: Das Wiki fuer EmergencyForge — Dokumentation, Anleitungen und Wissenssammlung
site_url: https://wiki.emergencyforge.de/
repo_url: https://github.com/EmergencyForge/Wiki
repo_name: EmergencyForge/Wiki
edit_uri: edit/main/docs/

theme:
  name: material
  language: de
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Dunkles Design aktivieren
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Helles Design aktivieren
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.path
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.action.edit
    - content.code.copy
    - content.tooltips
    - toc.follow
  logo: assets/logo3.png
  favicon: assets/logo2.png
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

plugins:
  - search:
      lang: de
  - social
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      locale: de
      fallback_to_build_date: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - pymdownx.mark
  - attr_list
  - md_in_html
  - def_list
  - tables
  - footnotes
  - abbr
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/EmergencyForge
      name: EmergencyForge auf GitHub
    - icon: fontawesome/brands/discord
      link: https://discord.gg/emergencyforge
      name: Discord
  generator: false

extra_css:
  - assets/stylesheets/extra.css

copyright: Copyright &copy; 2024-2026 EmergencyForge

nav:
  - Startseite: index.md
  - Erste Schritte:
      - getting-started/index.md
      - Installation: getting-started/installation.md
      - Konfiguration: getting-started/konfiguration.md
  - Dokumentation:
      - dokumentation/index.md
      - Architektur: dokumentation/architektur.md
      - API: dokumentation/api.md
  - Anleitungen:
      - anleitungen/index.md
  - Mitmachen:
      - mitmachen/beitragen.md
      - Wiki bearbeiten: mitmachen/wiki-bearbeiten.md
      - Styleguide: mitmachen/styleguide.md
